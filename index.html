<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; padding: 0; background: #F5F1EB; font-family: 'Atkinson Hyperlegible', sans-serif; }
  button { font-family: 'Atkinson Hyperlegible', sans-serif; }
  input, textarea, select { font-family: 'Atkinson Hyperlegible', sans-serif; }
  .dragging-task { opacity: 0.5 !important; }
  .dragging-section { opacity: 0.5 !important; }
  .drag-handle { cursor: grab; }
  .drag-handle:active { cursor: grabbing; }
  .section-drag-handle { cursor: grab; }
  .section-drag-handle:active { cursor: grabbing; }
  
  /* Responsive grid for Today sections */
  .today-grid {
    display: grid;
    gap: 16px;
    margin-bottom: 24px;
    grid-template-columns: repeat(4, 1fr);
  }
  
  /* Mobile: 1 column */
  @media (max-width: 767px) {
    .today-grid {
      grid-template-columns: 1fr;
    }
  }
  
  /* Tablet: 2 columns */
  @media (min-width: 768px) and (max-width: 1199px) {
    .today-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }
  
  /* Desktop: 4 columns */
  @media (min-width: 1200px) {
    .today-grid {
      grid-template-columns: repeat(4, 1fr);
    }
  }
</style>

// ─── Firebase sync ──────────────────────────────────────────────────────────
// Each user has a "sync code" (their private key). Same code on any device = synced data.
const LS_SYNCCODE = "gerak-synccode";

// Generate a random 6-character sync code (easy to type)
const genSyncCode = () => {
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // no confusing chars (0/O, 1/I/L)
  let code = "";
  for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
};

// Get or create the user's sync code
const getSyncCode = () => {
  let code = localStorage.getItem(LS_SYNCCODE);
  if (!code) { code = genSyncCode(); localStorage.setItem(LS_SYNCCODE, code); }
  return code;
};

const setSyncCode = (code) => { localStorage.setItem(LS_SYNCCODE, code.toUpperCase()); };

// Push all app data to Firebase under this sync code
const pushToFirebase = (code, data) => {
  if (!window.fbDatabase || !code) return;
  try { window.fbDatabase.ref("users/" + code).set({ ...data, updatedAt: Date.now() }); } catch(e) { console.error("Firebase push failed", e); }
};

// Listen for changes from Firebase (real-time)
const subscribeToFirebase = (code, callback) => {
  if (!window.fbDatabase || !code) return () => {};
  const ref = window.fbDatabase.ref("users/" + code);
  const handler = ref.on("value", (snapshot) => {
    const data = snapshot.val();
    if (data) callback(data);
  });
  return () => ref.off("value", handler);
};

// ─── format time ─────────────────────────────────────────────────────────────
const fmtTime = (secs) => {
  if (!secs) return null;
  if (secs < 60) return `${secs}s`;
  const m = Math.floor(secs / 60), h = Math.floor(m / 60);
  if (h > 0) return `${h}h ${m % 60}m`;
  return `${m}m`;
};

// Helper to determine if text should be white or dark based on background color
const isColorDark = (hexColor) => {
  const hex = hexColor.replace("#", "");
  const r = parseInt(hex.substr(0, 2), 16);
  const g = parseInt(hex.substr(2, 2), 16);
  const b = parseInt(hex.substr(4, 2), 16);
  const brightness = (r * 299 + g * 587 + b * 114) / 1000;
  return brightness < 128; // Dark if brightness is low
};

// ─── SectionHeader ────────────────────────────────────────────────────────────
function SectionHeader({ section, si, isCollapsed, onToggleCollapse, onRename, onSetEmoji, onSetColor, onSetFontColor, onDelete, onMoveUp, onMoveDown, canMoveUp, canMoveDown }) {
  const [editing, setEditing] = useState(false);
  const [editName, setEditName] = useState(section.label);
  const [showColorPicker, setShowColorPicker] = useState(false);
  const [showEmojiInput, setShowEmojiInput] = useState(false);
  const [emojiInput, setEmojiInput] = useState(section.emoji);
  const colorPickerRef = useRef(null);

  useEffect(() => {
    const handleClickOutside = (event) => {
      if (colorPickerRef.current && !colorPickerRef.current.contains(event.target)) {
        setShowColorPicker(false);
      }
    };

    if (showColorPicker) {
      document.addEventListener("click", handleClickOutside);
      return () => document.removeEventListener("click", handleClickOutside);
    }
  }, [showColorPicker]);

  return (
    <div style={{ display:"flex", alignItems:"center", gap:"8px", marginBottom:"8px", paddingBottom:"4px" }}>
      <button onClick={onToggleCollapse} style={{ background:"none", border:"none", cursor:"pointer", fontSize:"11px", color:section.fontColor==="white"?"rgba(255,255,255,0.5)":"rgba(0,0,0,0.3)", lineHeight:1, padding:"0 4px" }}>
        {isCollapsed ? "▶" : "▼"}
      </button>
      
      {showEmojiInput ? (
        <input autoFocus value={emojiInput} maxLength="2" onChange={e => setEmojiInput(e.target.value)} onBlur={() => { onSetEmoji(emojiInput || section.emoji); setShowEmojiInput(false); }} onKeyDown={e => { if(e.key==="Enter"){ onSetEmoji(emojiInput || section.emoji); setShowEmojiInput(false); } if(e.key==="Escape") setShowEmojiInput(false); }} style={{ width:"30px", fontSize:"16px", border:`1px solid ${section.fontColor==="white"?"rgba(255,255,255,0.3)":"rgba(0,0,0,0.2)"}`, borderRadius:"4px", padding:"2px", textAlign:"center", background:section.fontColor==="white"?"rgba(0,0,0,0.2)":"transparent", color:section.fontColor==="white"?"#FFFFFF":"#000000" }} />
      ) : (
        <button onClick={() => setShowEmojiInput(true)} style={{ background:"none", border:"none", fontSize:"18px", cursor:"pointer", padding:"0", lineHeight:1 }}>
          {section.emoji}
        </button>
      )}
      
      {editing ? (
        <input autoFocus value={editName} onChange={e => setEditName(e.target.value)} onBlur={() => { onRename(editName.trim() || section.label); setEditing(false); }} onKeyDown={e => { if(e.key==="Enter"){ onRename(editName.trim() || section.label); setEditing(false); } if(e.key==="Escape"){ setEditName(section.label); setEditing(false); } }} style={{ flex:1, fontSize:"14px", fontWeight:700, border:`1px solid ${section.fontColor==="white"?"rgba(255,255,255,0.3)":"rgba(0,0,0,0.3)"}`, borderRadius:"4px", background:section.fontColor==="white"?"rgba(0,0,0,0.2)":"transparent", outline:"none", padding:"2px 6px", color:section.fontColor==="white"?"#FFFFFF":"#000000" }} />
      ) : (
        <button onClick={() => { setEditName(section.label); setEditing(true); }} style={{ flex:1, background:"none", border:"none", textAlign:"left", cursor:"pointer", fontSize:"14px", fontWeight:700, color:section.fontColor==="white"?"#FFFFFF":"rgba(0,0,0,0.7)" }}>
          {section.label}
        </button>
      )}
      
      {/* move up/down - vertical stack */}
      <div style={{ display:"flex", gap:"2px" }}>
        <button onClick={onMoveUp} disabled={!canMoveUp} style={{ background:"none", border:"none", cursor:canMoveUp?"pointer":"default", fontSize:"12px", color:canMoveUp?"rgba(0,0,0,0.5)":"rgba(0,0,0,0.15)", opacity:canMoveUp?1:0.5 }}>▲</button>
        <button onClick={onMoveDown} disabled={!canMoveDown} style={{ background:"none", border:"none", cursor:canMoveDown?"pointer":"default", fontSize:"12px", color:canMoveDown?"rgba(0,0,0,0.5)":"rgba(0,0,0,0.15)", opacity:canMoveDown?1:0.5 }}>▼</button>
      </div>
      
      {/* color picker */}
      <div ref={colorPickerRef} style={{ position:"relative" }}>
        <button onClick={() => setShowColorPicker(!showColorPicker)} style={{ background:"none", border:"1px solid white", cursor:"pointer", fontSize:"12px", color:"#000000", borderRadius:"4px", padding:"2px 6px" }}>🎨</button>
        {showColorPicker && (
          <div style={{ position:"absolute", top:"30px", right:0, background:"white", border:"1px solid rgba(0,0,0,0.15)", borderRadius:"8px", boxShadow:"0 4px 12px rgba(0,0,0,0.1)", zIndex:100, padding:"8px", minWidth:"280px" }}>
            {Object.entries(COLOR_GROUPS).map(([group, colors]) => (
              <div key={group} style={{ marginBottom:"8px" }}>
                <div style={{ fontSize:"10px", color:"rgba(0,0,0,0.4)", marginBottom:"4px", fontWeight:600, textTransform:"uppercase" }}>{group}</div>
                <div style={{ display:"flex", gap:"4px", flexWrap:"wrap" }}>
                  {colors.map((c, i) => (
                    <button key={i} onClick={() => { onSetColor(c); setShowColorPicker(false); }} title={c.hex} style={{ width:"28px", height:"28px", background:c.hex, border:c.hex===section.color?"3px solid rgba(0,0,0,0.5)":"1px solid rgba(0,0,0,0.2)", borderRadius:"4px", cursor:"pointer" }} />
                  ))}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Font Color Toggle */}
      <button onClick={() => onSetFontColor(section.fontColor === "white" ? "black" : "white")} style={{ background:"none", border:"1px solid white", cursor:"pointer", fontSize:"16px", color:section.fontColor==="white"?"#FFFFFF":"#000000", borderRadius:"4px", padding:"2px 6px" }} title={`Font: ${section.fontColor || "black"}`}>
        ▪️
      </button>
      
      {/* delete */}
      <button onClick={onDelete} style={{ background:"none", border:"none", cursor:"pointer", fontSize:"12px", color:"#4A4A4A" }}>✕</button>
    </div>
  );
}

// ─── TaskItem ─────────────────────────────────────────────────────────────────
function TaskItem({ item, index, total, onToggle, onDelete, onMoveUp, onMoveDown, onToggleTimer, onAddTime, onMoveCategory, onEditText, onEditRecurs, onToggleUrgent, onSetDeadline, onSetExecutionDate, onExecuteToday, accent, fontColor, isDragging, onDragStart, onDragOver, onDrop, onDragEnd }) {
  const [addingTime, setAddingTime] = useState(false);
  const [mins, setMins] = useState("");
  const [live, setLive] = useState(0);
  const interval = useRef(null);

  useEffect(() => {
    if (item.timerStart) {
      interval.current = setInterval(() => setLive(Math.floor((Date.now() - item.timerStart) / 1000)), 1000);
    } else { clearInterval(interval.current); setLive(0); }
    return () => clearInterval(interval.current);
  }, [item.timerStart]);

  const estSecs = item.estimatedTime || 0;
  const actSecs = (item.actualTime || 0) + live;
  const urgent = item.urgent || item.text.includes("⚡");
  
  const isOverdue = item.deadline && item.deadline < todayStr() && !item.done;
  const isDueToday = item.deadline === todayStr() && !item.done;

  const [showMenu, setShowMenu] = useState(false);
  const [editing, setEditing] = useState(false);
  const [editText, setEditText] = useState(item.text);
  const menuRef = useRef(null);

  useEffect(() => {
    const handleClickOutside = (event) => {
      if (menuRef.current && !menuRef.current.contains(event.target)) {
        setShowMenu(false);
      }
    };

    if (showMenu) {
      document.addEventListener("click", handleClickOutside);
      return () => document.removeEventListener("click", handleClickOutside);
    }
  }, [showMenu]);

  return (
    <div 
      draggable
      onDragStart={(e) => onDragStart(e, index)}
      onDragOver={onDragOver}
      onDrop={(e) => onDrop(e, index)}
      onDragEnd={onDragEnd}
      className={isDragging ? "dragging-task" : ""}
      style={{ borderRadius:"8px", background: isDragging ? "rgba(0,0,0,0.08)" : "transparent", transition:"background 0.1s" }}
      onMouseEnter={e => !isDragging && (e.currentTarget.style.background="rgba(0,0,0,0.04)")}
      onMouseLeave={e => !isDragging && (e.currentTarget.style.background="transparent")}>
      <div style={{ display:"flex", alignItems:"center", gap:"6px", padding:"5px 6px" }}>
        {/* drag handle */}
        <div className="drag-handle" style={{ display:"flex", flexDirection:"column", flexShrink:0, fontSize:"10px", color:"rgba(0,0,0,0.15)" }}>⋮⋮</div>
        
        {/* ▲▼ */}
        <div style={{ display:"flex", flexDirection:"column", flexShrink:0 }}>
          <button onClick={onMoveUp} disabled={index===0} style={{ background:"none", border:"none", padding:"1px 3px", cursor:index===0?"default":"pointer", fontSize:"8px", color:index===0?"rgba(0,0,0,0.1)":"rgba(0,0,0,0.28)", lineHeight:1 }}>▲</button>
          <button onClick={onMoveDown} disabled={index===total-1} style={{ background:"none", border:"none", padding:"1px 3px", cursor:index===total-1?"default":"pointer", fontSize:"8px", color:index===total-1?"rgba(0,0,0,0.1)":"rgba(0,0,0,0.28)", lineHeight:1 }}>▼</button>
        </div>
        
        {/* checkbox */}
        <button onClick={onToggle} style={{ flexShrink:0, width:"18px", height:"18px", borderRadius:"50%", border:item.done?"none":"2px solid rgba(0,0,0,0.28)", background:item.done?"rgba(0,0,0,0.32)":"transparent", display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", padding:0 }}>
          {item.done && <span style={{ color:"white", fontSize:"9px", fontWeight:700 }}>✓</span>}
        </button>
        
        {/* label + details */}
        {editing ? (
          <input autoFocus value={editText}
            onChange={e => setEditText(e.target.value)}
            onBlur={() => { onEditText(editText.trim() || item.text); setEditing(false); }}
            onKeyDown={e => { if(e.key==="Enter"){ onEditText(editText.trim() || item.text); setEditing(false); } if(e.key==="Escape"){ setEditText(item.text); setEditing(false); } }}
            style={{ flex:1, background:"transparent", border:"none", borderBottom:`2px solid ${accent}`, outline:"none", fontFamily:"'Atkinson Hyperlegible', sans-serif", fontSize:"13px", padding:"2px 0", color:"rgba(0,0,0,0.78)" }} />
        ) : (
          <button onClick={onToggle} onDoubleClick={() => { setEditText(item.text); setEditing(true); }} style={{ flex:1, background:"none", border:"none", textAlign:"left", cursor:"pointer", fontFamily:"'Atkinson Hyperlegible', sans-serif", fontSize:"13px", lineHeight:"1.4", color:urgent&&!item.done?"#C43A3A":item.done?(fontColor==="white"?"rgba(255,255,255,0.4)":"rgba(0,0,0,0.3)"):(fontColor==="white"?"#FFFFFF":"#000000"), textDecoration:item.done?"line-through":"none", fontWeight:urgent&&!item.done?700:400, fontStyle:"normal", padding:0 }}>
            {item.text}
            {item.executionDate && !item.done && (
              <span style={{ fontSize:"10px", marginLeft:"7px", fontWeight:600, color:item.executionDate===todayStr()?"#5A9E62":"rgba(0,0,0,0.45)", background:item.executionDate===todayStr()?"rgba(90,158,98,0.12)":"rgba(0,0,0,0.06)", borderRadius:"4px", padding:"1px 5px" }}>
                📅 {item.executionDate===todayStr()?"Today":fmtShort(item.executionDate)}
              </span>
            )}
            {item.deadline && !item.done && (
              <span style={{ fontSize:"10px", marginLeft:"7px", fontWeight:600, color:isOverdue?"#C43A3A":isDueToday?"#C4823A":"rgba(0,0,0,0.4)", background:isOverdue?"rgba(196,58,58,0.1)":isDueToday?"rgba(196,130,58,0.1)":"rgba(0,0,0,0.06)", borderRadius:"4px", padding:"1px 5px" }}>
                {isOverdue?"⚠ ":isDueToday?"⏰ ":"⏳ "}{fmtShort(item.deadline)}
              </span>
            )}
            {(estSecs > 0 || actSecs > 0) && <span style={{ fontSize:"10px", marginLeft:"6px", color:item.timerStart?"#5A9E62":"rgba(0,0,0,0.35)", fontWeight:600, fontStyle:"normal" }}>⏱ {estSecs > 0 ? `EST ${fmtTime(estSecs)}` : ""}{estSecs > 0 && actSecs > 0 ? " | " : ""}{actSecs > 0 ? `ACT ${fmtTime(actSecs)}` : ""}{item.timerStart?" ●":""}</span>}
            {item.completedAt && <span style={{ fontSize:"10px", marginLeft:"6px", opacity:0.4, fontStyle:"italic", fontWeight:400 }}>✓ {fmtShort(item.completedAt)}</span>}
            {item.recurs && item.recurs !== "none" && <span style={{ marginLeft:"6px", fontSize:"11px", color:"rgba(0,0,0,0.45)" }}>🔄 {item.recurs}</span>}
          </button>
        )}
        
        {/* timer button */}
        <button onClick={onToggleTimer} style={{ background:item.timerStart?"#5A9E62":"#E8E8E8", border:"none", borderRadius:"6px", padding:"3px 7px", fontSize:"11px", cursor:"pointer", color:item.timerStart?"white":"#333333", fontWeight:600, flexShrink:0 }}>
          {item.timerStart ? "⏹" : "▶"}
        </button>
        
        {/* +m */}
        <button onClick={() => setAddingTime(v => !v)} style={{ background:"#E8E8E8", border:"none", borderRadius:"6px", padding:"3px 6px", fontSize:"10px", cursor:"pointer", color:"#333333", fontWeight:600, flexShrink:0 }}>+m</button>
        
        {/* ⋯ menu */}
        <div ref={menuRef} style={{ position:"relative", flexShrink:0 }}>
          <button onClick={() => setShowMenu(v => !v)} style={{ background:"rgba(0,0,0,0.07)", border:"none", borderRadius:"6px", padding:"3px 7px", fontSize:"12px", cursor:"pointer", color:"rgba(0,0,0,0.4)", fontWeight:700, lineHeight:1 }}>⋯</button>
          {showMenu && (
            <div style={{ position:"absolute", right:0, top:"24px", background:"white", borderRadius:"10px", boxShadow:"0 4px 16px rgba(0,0,0,0.15)", zIndex:50, overflow:"hidden", minWidth:"200px" }}>
              <button onClick={() => { onToggleUrgent(); setShowMenu(false); }} style={{ display:"block", width:"100%", background:"none", border:"none", padding:"10px 14px", textAlign:"left", fontFamily:"'Atkinson Hyperlegible', sans-serif", fontSize:"13px", cursor:"pointer", color:urgent?"#C43A3A":"#2C2C2C" }}
                onMouseEnter={e => e.currentTarget.style.background="rgba(0,0,0,0.05)"}
                onMouseLeave={e => e.currentTarget.style.background="none"}>
                {urgent ? "⚡ Remove urgent" : "⚡ Mark urgent"}
              </button>
              
              <select value={item.recurs || "none"} onChange={e => { onEditRecurs(e.target.value); setShowMenu(false); }} style={{ display:"block", width:"100%", padding:"10px 14px", border:"none", borderTop:"1px solid rgba(0,0,0,0.05)", background:"transparent", fontSize:"13px", cursor:"pointer", fontFamily:"'Atkinson Hyperlegible', sans-serif" }}>
                <option value="none">— No recurrence</option>
                <option value="daily">🔄 Daily</option>
                <option value="weekly">🔄 Weekly</option>
                <option value="monthly">🔄 Monthly</option>
                <option value="asneeded">🔄 As needed</option>
              </select>
              
              {/* Execution date */}
              <div style={{ borderTop:"1px solid rgba(0,0,0,0.05)", padding:"8px 14px", display:"flex", gap:"6px", alignItems:"center" }}>
                <span style={{ fontSize:"12px", color:"rgba(0,0,0,0.4)", flex:"1" }}>📅 Execution</span>
                <input type="date" value={item.executionDate || ""} onChange={e => { onSetExecutionDate(e.target.value || null); setShowMenu(false); }} style={{ flex:"1", padding:"4px", fontSize:"11px", border:"1px solid rgba(0,0,0,0.15)", borderRadius:"4px" }} />
              </div>
              
              {/* Deadline */}
              <div style={{ borderTop:"1px solid rgba(0,0,0,0.05)", padding:"8px 14px", display:"flex", gap:"6px", alignItems:"center" }}>
                <span style={{ fontSize:"12px", color:"rgba(0,0,0,0.4)", flex:"1" }}>⏳ Deadline</span>
                <input type="date" value={item.deadline || ""} onChange={e => { onSetDeadline(e.target.value || null); setShowMenu(false); }} style={{ flex:"1", padding:"4px", fontSize:"11px", border:"1px solid rgba(0,0,0,0.15)", borderRadius:"4px" }} />
              </div>
              
              {onExecuteToday && (
                <>
                  <button onClick={() => { onExecuteToday(); setShowMenu(false); }}
                    style={{ display:"block", width:"100%", background:"none", border:"none", padding:"10px 14px", textAlign:"left", fontFamily:"'Atkinson Hyperlegible', sans-serif", fontSize:"13px", cursor:"pointer", color:"#5A9E62", borderTop:"1px solid rgba(0,0,0,0.05)" }}
                    onMouseEnter={e => e.currentTarget.style.background="rgba(90,158,98,0.06)"}
                    onMouseLeave={e => e.currentTarget.style.background="none"}>→ Today</button>
                </>
              )}
              
              <button onClick={() => { onMoveCategory(); setShowMenu(false); }}
                style={{ display:"block", width:"100%", background:"none", border:"none", padding:"10px 14px", textAlign:"left", fontFamily:"'Atkinson Hyperlegible', sans-serif", fontSize:"13px", cursor:"pointer", color:"#2C2C2C", borderTop:"1px solid rgba(0,0,0,0.05)" }}
                onMouseEnter={e => e.currentTarget.style.background="rgba(0,0,0,0.05)"}
                onMouseLeave={e => e.currentTarget.style.background="none"}>📂 Move to category</button>
              
              <button onClick={() => { onDelete(); setShowMenu(false); }}
                style={{ display:"block", width:"100%", background:"none", border:"none", padding:"10px 14px", textAlign:"left", fontFamily:"'Atkinson Hyperlegible', sans-serif", fontSize:"13px", cursor:"pointer", color:"#C43A3A", borderTop:"1px solid rgba(0,0,0,0.05)" }}
                onMouseEnter={e => e.currentTarget.style.background="rgba(196,58,58,0.06)"}
                onMouseLeave={e => e.currentTarget.style.background="none"}>🗑 Delete</button>
            </div>
          )}
        </div>
      </div>
      {addingTime && (
        <div style={{ display:"flex", gap:"6px", padding:"2px 8px 6px 34px", alignItems:"center" }}>
          <input autoFocus type="number" value={mins} onChange={e => setMins(e.target.value)} placeholder="mins"
            style={{ width:"60px", border:"none", borderBottom:`2px solid ${accent}`, background:"transparent", fontFamily:"'Atkinson Hyperlegible', sans-serif", fontSize:"13px", outline:"none", padding:"2px 0" }} />
          <button onClick={() => { onAddTime(parseInt(mins)||0); setMins(""); setAddingTime(false); }}
            style={{ background:accent, border:"none", borderRadius:"6px", color:"white", padding:"3px 10px", cursor:"pointer", fontSize:"12px", fontWeight:700 }}>Add</button>
          <button onClick={() => setAddingTime(false)} style={{ background:"rgba(0,0,0,0.07)", border:"none", borderRadius:"6px", padding:"3px 7px", cursor:"pointer", fontSize:"12px" }}>✕</button>
        </div>
      )}
    </div>
  );
}

// ─── Timer Helper: Pause & Accumulate ──────────────────────────────────────────
const toggleTimer = (item) => ({
  ...item,
  timerStart: item.timerStart ? null : Date.now(),
  actualTime: item.timerStart ? (item.actualTime || 0) + Math.floor((Date.now() - item.timerStart) / 1000) : item.actualTime
});

      <div style={{ background:"white", borderRadius:"16px", padding:"24px", maxWidth:"400px", width:"100%", boxShadow:"0 8px 40px rgba(0,0,0,0.2)" }}>

function BackupModal({ today, done, powerUp, date, projects, appBg, season, onClose }) {
  const [copied, setCopied] = useState(false);
  const [saved,  setSaved]  = useState(false);
  const text = JSON.stringify({ today, done, powerUp, date, projects, appBg, season, exportedAt: new Date().toISOString() });

  const saveFile = () => {
    try {
      const blob = new Blob([text], { type: "application/json" });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a");
      a.href     = url;
      a.download = `planner-backup-${date}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      setSaved(true); setTimeout(() => setSaved(false), 3000);
    } catch(e) { copy(); }
  };

  const copy = () => {
    navigator.clipboard.writeText(text).catch(() => { const ta = document.getElementById("bta"); if(ta){ta.select();document.execCommand("copy");} });
    setCopied(true); setTimeout(() => setCopied(false), 2500);
  };

  return (
    <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, background:"rgba(0,0,0,0.55)", zIndex:200, display:"flex", alignItems:"center", justifyContent:"center", padding:"20px" }}>
      <div style={{ background:appBg==="black"?"#333333":"white", border:appBg==="black"?"1px solid rgba(255,255,255,0.5)":"none", borderRadius:"16px", padding:"24px", maxWidth:"480px", width:"100%", boxShadow:"0 8px 40px rgba(0,0,0,0.2)" }}>

function RestoreModal({ appBg, onRestoreAndReset, onSetAppBg, onSetSeason, onPushRestore, onClose }) {
  const [txt, setTxt] = useState("");
  const [msg, setMsg] = useState("");

  const doRestore = (jsonStr) => {
    try {
      const b = JSON.parse(jsonStr.trim());
      if (b.today)    save(LS_TODAY, b.today);
      if (b.done)     save(LS_DONE,  b.done);
      if (b.powerUp)  save(LS_PU,    b.powerUp);
      if (b.date)     save(LS_DATE,  b.date);
      if (b.projects) save(LS_PROJ,  b.projects);
      if (b.appBg)    onSetAppBg(b.appBg);
      if (b.season)   onSetSeason(b.season);
      // Push restored data to Firebase so cloud sync doesn't overwrite it
      if (onPushRestore) onPushRestore(b);
      setMsg("✓ Restored!");
      setTimeout(() => { onRestoreAndReset(); }, 1200);
    } catch { setMsg("✗ Invalid backup file."); }
  };

  const loadFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => doRestore(ev.target.result);
    reader.readAsText(file);
    e.target.value = "";
  };

  return (
    <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, background:"rgba(0,0,0,0.55)", zIndex:200, display:"flex", alignItems:"center", justifyContent:"center", padding:"20px" }}>
      <div style={{ background:appBg==="black"?"#333333":"white", border:appBg==="black"?"1px solid rgba(255,255,255,0.5)":"none", borderRadius:"16px", padding:"24px", maxWidth:"480px", width:"100%", boxShadow:"0 8px 40px rgba(0,0,0,0.2)" }}>
        <h2 style={{ fontFamily:"'Atkinson Hyperlegible', sans-serif", fontSize:"16px", fontWeight:700, margin:"0 0 8px", color:appBg==="black"?"#FFFFFF":"#000000" }}>⬆ Restore Backup</h2>
        <p style={{ fontSize:"13px", color:appBg==="black"?"rgba(255,255,255,0.6)":"rgba(0,0,0,0.5)", margin:"0 0 14px", fontFamily:"'Atkinson Hyperlegible', sans-serif" }}>Load from iCloud file, or paste backup text.</p>
        <label style={{ display:"block", width:"100%", background:appBg==="black"?"#000000":"#2C2C2C", border:"none", borderRadius:"8px", color:"white", padding:"12px", cursor:"pointer", fontFamily:"'Atkinson Hyperlegible', sans-serif", fontSize:"13px", fontWeight:700, marginBottom:"12px", textAlign:"center", boxSizing:"border-box" }}>
          📂 Load from file (iCloud Drive)
          <input type="file" accept=".json,application/json" onChange={loadFile} style={{ display:"none" }} />
        </label>
        <textarea value={txt} onChange={e => setTxt(e.target.value)} placeholder="…or paste backup text here" style={{ width:"100%", height:"90px", borderRadius:"8px", border:appBg==="black"?"1px solid rgba(255,255,255,0.2)":"1px solid rgba(0,0,0,0.15)", padding:"10px", fontSize:"10px", fontFamily:"monospace", resize:"none", boxSizing:"border-box", background:appBg==="black"?"#222222":"white", color:appBg==="black"?"rgba(255,255,255,0.7)":"#000000" }} />
        {msg && <div style={{ marginTop:"8px", fontSize:"13px", color:msg.startsWith("✓")?"#5A9E62":"#C43A3A", fontFamily:"'Atkinson Hyperlegible', sans-serif", fontWeight:600 }}>{msg}</div>}
        <div style={{ display:"flex", gap:"8px", marginTop:"10px" }}>
          <button onClick={() => doRestore(txt)} style={{ flex:1, background:appBg==="black"?"#000000":"rgba(0,0,0,0.7)", border:"none", borderRadius:"8px", color:"white", padding:"11px", cursor:"pointer", fontFamily:"'Atkinson Hyperlegible', sans-serif", fontSize:"13px", fontWeight:700 }}>Restore from text</button>
          <button onClick={onClose} style={{ background:appBg==="black"?"#1A1A1A":"rgba(0,0,0,0.07)", border:"none", borderRadius:"8px", color:appBg==="black"?"#FFFFFF":"rgba(0,0,0,0.6)", padding:"11px 16px", cursor:"pointer", fontFamily:"'Atkinson Hyperlegible', sans-serif", fontSize:"13px" }}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

// ─── Planner ──────────────────────────────────────────────────────────────────
function Planner({ onReset, user, onSignOut }) {
  const [todaySections, setTodaySections] = useState(load(LS_TODAY, SEED_TODAY));
  const [projects, setProjects] = useState(load(LS_PROJ, []));
  const [done, setDone] = useState(migrateDone(load(LS_DONE, [])));
  const [powerUp, setPowerUp] = useState(load(LS_PU, buildPowerUp()));
  const [date, setDate] = useState(load(LS_DATE, todayStr()));
  const [tab, setTab] = useState("today");
  const [addingSection, setAddingSection] = useState(false);
  const [newSecName, setNewSecName] = useState("");
  const [showBackup, setShowBackup] = useState(false);
  const [showRestore, setShowRestore] = useState(false);
  const [showClear, setShowClear] = useState(false);
  const [movingItem, setMovingItem] = useState(null);
  const [puActions, setPuActions] = useState(null);
  const [draggedTask, setDraggedTask] = useState(null);
  const [draggedSection, setDraggedSection] = useState(null);
  const [collapsedSections, setCollapsedSections] = useState({}); // Collapsed by default
  const [addingItemInSection, setAddingItemInSection] = useState(null); // Track which section is adding an item
  const [newItemText, setNewItemText] = useState({});
  
  // Initialize collapsed state - check if key exists, default to true (COLLAPSED by default)
  const getCollapsedState = (key) => {
    if (collapsedSections.hasOwnProperty(key)) return collapsedSections[key];
    return true; // default COLLAPSED
  };
  const [doneSort, setDoneSort] = useState("all"); // "all" | "date" | "category"
  const [futureSort, setFutureSort] = useState("all"); // "all" | "deadline" | "executionDate"
  const [futureFilterCat, setFutureFilterCat] = useState("all"); // Category filter for deadline/execution views
  const [projectsSort, setProjectsSort] = useState("all"); // "all" | "deadline" | "executionDate"
  const [projectsFilterCat, setProjectsFilterCat] = useState("all"); // Category filter for deadline/execution views
  const [doneFilterCat, setDoneFilterCat] = useState("all"); // Category filter for Done tab
  const [doneFilterMonth, setDoneFilterMonth] = useState("all"); // Month filter for Done tab
  const [appBg, setAppBg] = useState("white"); // "white" or "black"
  const [season, setSeason] = useState("spring"); // "winter" | "spring" | "summer" | "autumn" | "grayscale"

  // ─── Firebase sync state ───────────────────────────────────────────────
  // Use logged-in user's UID as the private data key (each Google account = own data)
  const syncCode = user && user.uid ? user.uid : getSyncCode();
  const [showSync, setShowSync] = useState(false);
  const [syncStatus, setSyncStatus] = useState("connecting"); // "connecting" | "synced" | "offline"
  const isReceivingRef = useRef(false); // prevent echo loop (don't re-push data we just received)

  // Bundle all app data for Firebase
  const bundleData = (overrides = {}) => ({
    today:    overrides.today    !== undefined ? overrides.today    : todaySections,
    done:     overrides.done     !== undefined ? overrides.done     : done,
    powerUp:  overrides.powerUp  !== undefined ? overrides.powerUp  : powerUp,
    projects: overrides.projects !== undefined ? overrides.projects : projects,
    date:     overrides.date     !== undefined ? overrides.date     : date,
    appBg:    overrides.appBg    !== undefined ? overrides.appBg    : appBg,
    season:   overrides.season   !== undefined ? overrides.season   : season,
  });

  // Subscribe to Firebase on mount + when sync code changes
  useEffect(() => {
    if (!window.fbDatabase) { setSyncStatus("offline"); return; }
    setSyncStatus("connecting");

    // Listen to Firebase's built-in connection status
    const connectedRef = window.fbDatabase.ref(".info/connected");
    const connHandler = connectedRef.on("value", (snap) => {
      setSyncStatus(snap.val() === true ? "synced" : "connecting");
    });

    // Subscribe to this user's data
    const unsub = subscribeToFirebase(syncCode, (data) => {
      isReceivingRef.current = true; // mark that next state changes come from Firebase
      // Firebase drops empty arrays, so normalize: ensure arrays exist + every section has items[]
      const fixSections = (arr) => (Array.isArray(arr) ? arr : []).map(s => ({ ...s, items: Array.isArray(s.items) ? s.items : [] }));
      const t = fixSections(data.today);
      const dn = Array.isArray(data.done) ? data.done : [];
      const pu = fixSections(data.powerUp);
      const pr = fixSections(data.projects);
      setTodaySections(t); save(LS_TODAY, t);
      setDone(dn); save(LS_DONE, dn);
      setPowerUp(pu); save(LS_PU, pu);
      setProjects(pr); save(LS_PROJ, pr);
      if (data.date)     { setDate(data.date); save(LS_DATE, data.date); }
      if (data.appBg)    setAppBg(data.appBg);
      if (data.season)   setSeason(data.season);
      setSyncStatus("synced");
      setTimeout(() => { isReceivingRef.current = false; }, 100);
    });

    // If nothing in Firebase yet, push current local data up
    setTimeout(() => {
      window.fbDatabase.ref("users/" + syncCode).once("value").then(snap => {
        if (!snap.val()) { pushToFirebase(syncCode, bundleData()); }
      }).catch((e) => console.warn("Initial Firebase read failed", e));
    }, 800);

    return () => { connectedRef.off("value", connHandler); unsub(); };
  }, [syncCode]);

  // Persist functions: update state, save locally, AND push to Firebase
  const persistToday = (s) => { setTodaySections(s); save(LS_TODAY, s); if(!isReceivingRef.current) pushToFirebase(syncCode, bundleData({today:s})); };
  const persistDone = (d) => { setDone(d); save(LS_DONE, d); if(!isReceivingRef.current) pushToFirebase(syncCode, bundleData({done:d})); };
  const persistPowerUp = (p) => { setPowerUp(p); save(LS_PU, p); if(!isReceivingRef.current) pushToFirebase(syncCode, bundleData({powerUp:p})); };
  const persistProjects = (p) => { setProjects(p); save(LS_PROJ, p); if(!isReceivingRef.current) pushToFirebase(syncCode, bundleData({projects:p})); };

  const setDeadlinePU = (si, ii, d) => persistPowerUp(powerUp.map((s,i) => i!==si?s:{ ...s, items:s.items.map((it,j)=>j!==ii?it:{...it,deadline:d}) }));
  const setExecutionPU = (si, ii, d) => persistPowerUp(powerUp.map((s,i) => i!==si?s:{ ...s, items:s.items.map((it,j)=>j!==ii?it:{...it,executionDate:d}) }));
  const moveCategoryPU = (si, ii, toSi) => {
    const item = powerUp[si].items[ii];
    persistPowerUp(powerUp.map((s,i) => {
      if (i === si) return { ...s, items: s.items.filter((_,j) => j !== ii) };
      if (i === toSi) return { ...s, items: [...s.items, item] };
      return s;
    }));
  };
  const moveTodayItem = (si, ii, toSi) => {
    const item = todaySections[si].items[ii];
    persistToday(todaySections.map((s,i) => {
      if (i === si) return { ...s, items: s.items.filter((_,j) => j !== ii) };
      if (i === toSi) return { ...s, items: [...s.items, item] };
      return s;
    }));
  };

  // Add item to section
  const addItemToSection = (tabName, si, text) => {
    if (!text.trim()) return;
    const newItem = { text: text.trim(), done: false, estimatedTime: 0, actualTime: 0, timerStart: null, recurs: "none", urgent: false, deadline: null, completedAt: null, executionDate: null, scheduledTo: null };
    if (tabName === "today") {
      persistToday(todaySections.map((s,i) => i!==si?s:{...s, items: [...s.items, newItem]}));
      setNewItemText({...newItemText, [si]: ""});
    } else if (tabName === "future") {
      persistPowerUp(powerUp.map((s,i) => i!==si?s:{...s, items: [...s.items, newItem]}));
      setNewItemText({...newItemText, [`future-${si}`]: ""});
    } else if (tabName === "projects") {
      persistProjects(projects.map((s,i) => i!==si?s:{...s, items: [...s.items, newItem]}));
      setNewItemText({...newItemText, [`projects-${si}`]: ""});
    }
  };

  // Move sections vertically (for Today tab)
  const moveSectionUp = (si) => {
    if (si > 0) {
      const newSections = [...todaySections];
      [newSections[si], newSections[si-1]] = [newSections[si-1], newSections[si]];
      persistToday(newSections);
    }
  };

  const moveSectionDown = (si) => {
    if (si < todaySections.length - 1) {
      const newSections = [...todaySections];
      [newSections[si], newSections[si+1]] = [newSections[si+1], newSections[si]];
      persistToday(newSections);
    }
  };

  return (
    <div style={{ minHeight:"100vh", background:appBg==="black"?"#1A1A1A":"#FFFFFF", padding:"16px", transition:"background 0.3s" }}>
      <div style={{ maxWidth:"1200px", margin:"0 auto" }}>
      {/* header - Row 1: logo + action buttons */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"12px", gap:"8px", flexWrap:"wrap" }}>
        <img src={appBg==="black"?LOGO_DARK:LOGO_LIGHT} alt="Gérak. Get it done." style={{ height:"34px", width:"auto", display:"block", flexShrink:0 }} />
        <div style={{ display:"flex", gap:"8px", flexWrap:"wrap", justifyContent:"flex-end" }}>
          <button onClick={() => setShowSync(true)} style={{ background: syncStatus==="synced"?"#5A9E62":syncStatus==="connecting"?"#E0A030":"#999999", color:"white", border:"none", borderRadius:"8px", padding:"8px 12px", cursor:"pointer", fontSize:"12px", fontWeight:600 }} title={`Sync: ${syncStatus}`}>{syncStatus==="synced"?"☁️ Synced":syncStatus==="connecting"?"☁️ …":"☁️ Offline"}</button>
          <button onClick={() => setShowBackup(true)} style={{ background:appBg==="black"?"#1A1A1A":"rgba(0,0,0,0.08)", color:appBg==="black"?"#FFFFFF":"inherit", border:"none", borderRadius:"8px", padding:"8px 12px", cursor:"pointer", fontSize:"12px" }}>💾 Backup</button>
          <button onClick={() => setShowRestore(true)} style={{ background:appBg==="black"?"#1A1A1A":"rgba(0,0,0,0.08)", color:appBg==="black"?"#FFFFFF":"inherit", border:"none", borderRadius:"8px", padding:"8px 12px", cursor:"pointer", fontSize:"12px" }}>📥 Restore</button>
          <button onClick={() => setShowClear(true)} style={{ background:"#C43A3A", color:"white", border:"none", borderRadius:"8px", padding:"8px 12px", cursor:"pointer", fontSize:"12px", fontWeight:600 }}>🗑 Clear</button>
        </div>
      </div>

      {/* header - Row 2: date + clear completed */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"20px", gap:"8px", flexWrap:"wrap" }}>
        <input type="date" value={date} onChange={e => { const nd=e.target.value; setDate(nd); save(LS_DATE, nd); if(!isReceivingRef.current) pushToFirebase(syncCode, bundleData({date:nd})); }} style={{ padding:"8px", border:`1px solid ${appBg==="black"?"#444444":"rgba(0,0,0,0.2)"}`, borderRadius:"6px", fontSize:"13px", background:appBg==="black"?"#333333":"white", color:appBg==="black"?"#FFFFFF":"#000000" }} />
        <div style={{ display:"flex", gap:"8px" }}>
          {tab === "today" && todaySections.some(s => (s.items||[]).some(it => it.done)) && (
            <button onClick={() => {
              const completedTasks = [];
              todaySections.forEach(section => {
                section.items.forEach(item => {
                  if (item.done) {
                    completedTasks.push({
                      ...item,
                      section: section.id,
                      sectionInfo: { id: section.id, label: section.label, emoji: section.emoji, color: section.color, fontColor: section.fontColor }
                    });
                  }
                });
              });
              if (completedTasks.length > 0) {
                persistDone([...done, ...completedTasks]);
                persistToday(todaySections.map(s => ({ ...s, items: s.items.filter(it => !it.done) })));
              }
            }} style={{ background:"#5A9E62", color:"white", border:"none", borderRadius:"8px", padding:"8px 12px", cursor:"pointer", fontSize:"12px", fontWeight:600 }}>✓ Clear Completed</button>
          )}
          {tab === "future" && powerUp.some(s => (s.items||[]).some(it => it.done)) && (
            <button onClick={() => { 
              const completedTasks = []; 
              powerUp.forEach(section => { 
                section.items.forEach(item => { 
                  if(item.done) {
                    completedTasks.push({
                      ...item,
                      section: section.id,
                      sectionInfo: { id: section.id, label: section.label, emoji: section.emoji, color: section.color, fontColor: section.fontColor }
                    });
                  }
                }); 
              }); 
              if(completedTasks.length > 0) { 
                persistDone([...done, ...completedTasks]);

                            color: section.color,
                            accent: section.accent,
                            fontColor: section.fontColor,

              </div>

                          <div style={{ fontSize:"11px", color:displayTextColor, display:"flex", gap:"6px", flexWrap:"wrap", alignItems:"center" }}>
                            <span style={{ background:"rgba(0,0,0,0.06)", padding:"2px 6px", borderRadius:"3px" }}>✓ {fmtShort(item.completedAt || "")}</span>
                            {isOrphan && <span style={{ background:"rgba(0,0,0,0.1)", padding:"2px 6px", borderRadius:"3px", fontSize:"10px", fontStyle:"italic" }}>orphan</span>}
                          </div>
                        </div>
                        <button onClick={() => persistDone(done.filter((_,i) => i!==idx))} style={{ flexShrink:0, color:"rgba(0,0,0,0.2)", background:"none", border:"none", cursor:"pointer", fontSize:"16px" }}>✕</button>
                      </div>
                    </div>
                  );
                })
              }
            </div>
          ) : (
            <div style={{ padding:"40px 20px", background:"rgba(0,0,0,0.03)", borderRadius:"12px", textAlign:"center", color:"rgba(0,0,0,0.3)" }}>
              <p style={{ margin:0, fontSize:"13px" }}>No completed tasks yet. Go get 'em! 🚀</p>
            </div>
          )}
        </>
      )}

      {/* Modals */}
      {movingItem && (
        <MoveTodayCategoryModal
          item={todaySections[movingItem.si].items[movingItem.ii]}
          fromSi={movingItem.si}
          sections={todaySections}
          onMove={(toSi) => moveTodayItem(movingItem.si, movingItem.ii, toSi)}
          onClose={() => setMovingItem(null)} />
      )}
      {showClear && (
        <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, background:"rgba(0,0,0,0.55)", zIndex:200, display:"flex", alignItems:"center", justifyContent:"center", padding:"20px" }}>
          <div style={{ background:"white", borderRadius:"16px", padding:"24px", maxWidth:"400px", width:"100%", boxShadow:"0 8px 40px rgba(0,0,0,0.2)" }}>
            <h2 style={{ fontFamily:"'Atkinson Hyperlegible', sans-serif", fontSize:"16px", fontWeight:700, margin:"0 0 8px" }}>🗑 Clear all data?</h2>
            <p style={{ fontSize:"13px", color:"rgba(0,0,0,0.55)", margin:"0 0 8px", fontFamily:"'Atkinson Hyperlegible', sans-serif" }}>
              This wipes everything and resets to a fresh blank planner. This cannot be undone.
            </p>
            <p style={{ fontSize:"12px", color:"#C43A3A", margin:"0 0 18px", fontFamily:"'Atkinson Hyperlegible', sans-serif", fontWeight:600 }}>
              ⚠️ Backup first if you might want your data back!
            </p>
            <div style={{ display:"flex", gap:"8px" }}>
              <button onClick={() => {
                localStorage.removeItem(LS_TODAY);
                localStorage.removeItem(LS_DONE);
                localStorage.removeItem(LS_PU);
                localStorage.removeItem(LS_DATE);
                localStorage.removeItem(LS_PROJ);
                setShowClear(false);
                onReset();
              }} style={{ flex:1, background:"#C43A3A", border:"none", borderRadius:"8px", color:"white", padding:"11px", cursor:"pointer", fontFamily:"'Atkinson Hyperlegible', sans-serif", fontSize:"13px", fontWeight:700 }}>Yes, clear everything</button>
              <button onClick={() => setShowClear(false)} style={{ background:"rgba(0,0,0,0.07)", border:"none", borderRadius:"8px", color:"rgba(0,0,0,0.6)", padding:"11px 16px", cursor:"pointer", fontFamily:"'Atkinson Hyperlegible', sans-serif", fontSize:"13px" }}>Cancel</button>
            </div>
          </div>
        </div>
      )}
      </div>
      {showBackup  && <BackupModal today={todaySections} done={done} powerUp={powerUp} date={date} projects={projects} appBg={appBg} season={season} onClose={() => setShowBackup(false)} />}
      {showRestore && <RestoreModal appBg={appBg} onRestoreAndReset={() => { setShowRestore(false); onReset(); }} onSetAppBg={setAppBg} onSetSeason={setSeason} onPushRestore={(b) => { pushToFirebase(syncCode, { today: b.today || todaySections, done: b.done || done, powerUp: b.powerUp || powerUp, projects: b.projects || projects, date: b.date || date, appBg: b.appBg || appBg, season: b.season || season }); }} onClose={() => setShowRestore(false)} />}
      {showSync && <SyncModal appBg={appBg} user={user} syncStatus={syncStatus} onSignOut={onSignOut} onClose={() => setShowSync(false)} />}
    </div>
  );
}

function LoginScreen({ onGoogleSignIn, signingIn, error }) {
  return (
    <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"24px", background:"#F5F1EB", fontFamily:"'Atkinson Hyperlegible', sans-serif" }}>
      <div style={{ background:"white", borderRadius:"24px", padding:"48px 36px", maxWidth:"400px", width:"100%", boxShadow:"0 8px 30px rgba(0,0,0,0.08)", textAlign:"center" }}>
        <img src={LOGO_LIGHT} alt="Gérak. Get it done." style={{ width:"220px", maxWidth:"80%", height:"auto", marginBottom:"28px" }} />
        <p style={{ fontSize:"15px", color:"rgba(0,0,0,0.6)", lineHeight:1.6, margin:"0 0 32px" }}>
          A task tracker for ADHD brains.<br/>Sign in to sync across all your devices.
        </p>
        <button
          onClick={onGoogleSignIn}
          disabled={signingIn}
          style={{ width:"100%", display:"flex", alignItems:"center", justifyContent:"center", gap:"12px", background:"white", border:"1px solid rgba(0,0,0,0.2)", borderRadius:"12px", padding:"14px", cursor:signingIn?"default":"pointer", fontSize:"15px", fontWeight:700, color:"rgba(0,0,0,0.75)", fontFamily:"'Atkinson Hyperlegible', sans-serif", opacity:signingIn?0.6:1 }}
        >
          <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.1 29.6 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.3-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.1 19 12 24 12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.1 29.6 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.5 0 10.5-2.1 14.3-5.6l-6.6-5.6C29.6 34.6 26.9 36 24 36c-5.2 0-9.6-3.3-11.2-8l-6.6 5.1C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.2-4 5.6l6.6 5.6C41.4 36.1 44 30.5 44 24c0-1.3-.1-2.3-.4-3.5z"/></svg>
          {signingIn ? "Signing in…" : "Sign in with Google"}
        </button>
        {error && <p style={{ color:"#C43A3A", fontSize:"13px", marginTop:"16px" }}>{error}</p>}
        <p style={{ fontSize:"12px", color:"rgba(0,0,0,0.4)", marginTop:"32px", lineHeight:1.5 }}>
          by The Orange Elephant 🧡
        </p>
      </div>
    </div>
  );
}

function App() {
  const [key, setKey] = useState(0);
  const [user, setUser] = useState(undefined); // undefined = checking, null = logged out, object = logged in
  const [signingIn, setSigningIn] = useState(false);
  const [authError, setAuthError] = useState("");

  useEffect(() => {
    if (!window.fbAuth) {
      // No Firebase (offline/local) — allow app to run without login
      setUser(null);
      return;
    }
    // Complete any redirect sign-in
    window.fbAuth.getRedirectResult().catch(() => {});
    const unsub = window.fbAuth.onAuthStateChanged((u) => {
      setUser(u || null);
      setSigningIn(false);
    });
    return unsub;
  }, []);

  const handleGoogleSignIn = () => {
    if (!window.fbAuth) { setAuthError("Sign-in unavailable offline. Open the live site."); return; }
    setSigningIn(true);
    setAuthError("");
    // Try popup first; fall back to redirect (better for mobile/PWA)
    window.fbAuth.signInWithPopup(window.fbGoogleProvider)
      .catch((err) => {
        if (err && (err.code === "auth/popup-blocked" || err.code === "auth/cancelled-popup-request" || err.code === "auth/operation-not-supported-in-this-environment")) {
          window.fbAuth.signInWithRedirect(window.fbGoogleProvider).catch((e2) => {
            setSigningIn(false); setAuthError("Sign-in failed. Please try again.");
          });
        } else if (err && err.code === "auth/popup-closed-by-user") {
          setSigningIn(false);
        } else {
          setSigningIn(false);
          setAuthError("Sign-in failed. Please try again.");
        }
      });
  };

  const handleSignOut = () => {
    if (window.fbAuth) window.fbAuth.signOut();
  };

  // Still checking auth state
  if (user === undefined) {
    return <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:"#F5F1EB", fontFamily:"'Atkinson Hyperlegible', sans-serif", color:"rgba(0,0,0,0.4)" }}>Loading…</div>;
  }

  // Logged out — but only require login if Firebase is available
  if (user === null && window.fbAuth) {
    return <LoginScreen onGoogleSignIn={handleGoogleSignIn} signingIn={signingIn} error={authError} />;
  }

  // Logged in (or offline mode) — show the app
  return <Planner key={key} onReset={() => setKey(k => k+1)} user={user} onSignOut={handleSignOut} />;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
